<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Care & Care | Premium NDIS & ECEI Services Australia</title>
    <meta name="description" content="Care & Care is a registered NDIS provider in Australia specializing in Early Childhood Early Intervention (ECEI), Support Coordination, and Plan Management.">
    <meta name="keywords" content="NDIS, ECEI, Early Childhood Intervention, Support Coordination, Plan Management, Disability Support Australia, Care and Care">
    <meta name="author" content="Care and Care">
    <meta name="robots" content="index, follow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES & BASE --- */
        :root {
            --brand-blue: #599fc4; 
            --black: #000000; 
            --dark-gray: #111111;
            --light-gray: #f5f5f7;
            --white: #ffffff;
            --text-muted: #888888;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--white); color: var(--black); 
            overflow-x: hidden; line-height: 1.6; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }

        /* --- FADE ANIMATIONS --- */
        .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* --- HEADER & NAV --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .brand-logo { height: 45px; width: auto; }
        nav { display: flex; gap: 40px; align-items: center; }
        .nav-item { position: relative; padding: 20px 0; }
        .nav-link { text-decoration: none; color: var(--black); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition); display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link { color: var(--brand-blue); }
        .nav-arrow { font-size: 10px; transition: var(--transition); }
        .nav-item:hover .nav-arrow { transform: rotate(180deg); }

        .dropdown-menu { 
            position: absolute; top: 100%; left: 0; background: var(--black); min-width: 250px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            padding: 10px; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transform: translateY(10px); transition: var(--transition); 
        }
        .nav-item:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-menu a { padding: 15px 20px; color: var(--white); text-decoration: none; font-weight: 500; font-size: 14px; border-radius: 8px; transition: var(--transition); }
        .dropdown-menu a:hover { background: #222; color: var(--brand-blue); padding-left: 25px; }

        /* --- HERO --- */
        .hero { 
            height: 100vh; min-height: 700px; display: flex; align-items: center; padding: 0 5%; margin-top: 70px;
            background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1516627145497-ae6968895b74?auto=format&fit=crop&w=1920&q=80') center/cover;
            color: var(--white); 
        }
        .hero-content { max-width: 900px; }
        .hero-content h1 { font-size: 80px; font-weight: 900; line-height: 1.05; letter-spacing: -3px; margin-bottom: 30px; }
        .hero-content p { font-size: 22px; font-weight: 300; opacity: 0.8; margin-bottom: 50px; max-width: 600px; }
        .premium-btn { display: inline-block; background: var(--white); color: var(--black); font-weight: 800; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; padding: 20px 50px; border-radius: 50px; text-decoration: none; transition: var(--transition); }
        .premium-btn:hover { background: var(--brand-blue); color: var(--white); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(89, 159, 196, 0.4); }

        /* --- TESTIMONIALS TICKER --- */
        .ticker-container { background: var(--white); padding: 25px 0; overflow: hidden; width: 100%; border-bottom: 1px solid #eee; position: relative; }
        .ticker-track { display: inline-flex; width: max-content; animation: scrollTicker 30s linear infinite; }
        .ticker-track:hover { animation-play-state: paused; }
        @keyframes scrollTicker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .ticker-item { display: inline-flex; align-items: center; gap: 15px; padding: 0 40px; font-size: 16px; font-weight: 500; color: var(--text-muted); }
        .ticker-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .ticker-item strong { color: var(--black); }

        /* --- SECTIONS --- */
        section { padding: 120px 5%; scroll-margin-top: 80px; } 
        .section-dark { background: var(--black); color: var(--white); }
        .section-light { background: var(--light-gray); }
        .section-title { font-size: 50px; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; }
        .section-subtitle { font-size: 20px; color: var(--text-muted); margin-bottom: 60px; max-width: 600px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: var(--transition); color: var(--black); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 280px; object-fit: cover; transition: transform 0.8s ease; }
        .card:hover img { transform: scale(1.05); }
        .card-body { padding: 40px; }
        .card-body h3 { font-size: 26px; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }

        /* --- FOOTER --- */
        footer { background: var(--dark-gray); color: var(--white); padding: 100px 5% 40px 5%; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 50px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 60px; margin-bottom: 40px; }
        .footer-col h3 { font-size: 14px; font-weight: 800; margin-bottom: 25px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .footer-col a, .footer-col p { color: var(--white); text-decoration: none; font-size: 16px; margin-bottom: 15px; display: block; opacity: 0.8; transition: var(--transition); }
        .footer-col a:hover { opacity: 1; color: var(--brand-blue); padding-left: 5px; }

        /* --- WIDGETS --- */
        .widget-btn { position: fixed; bottom: 30px; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: var(--transition); z-index: 9999; border: none; outline: none; }
        .wa-btn { right: 30px; background: #25d366; }
        .chat-toggle { left: 30px; background: var(--black); color: var(--white); }
        .widget-btn:hover { transform: scale(1.1); }

        .chat-window { position: fixed; bottom: 110px; left: 30px; width: 350px; background: var(--white); border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); display: flex; flex-direction: column; z-index: 9999; opacity: 0; visibility: hidden; transform: translateY(20px); transition: var(--transition); overflow: hidden; }
        .chat-window.open { opacity: 1; visibility: visible; transform: translateY(0); }
        .chat-head { background: var(--black); color: var(--white); padding: 20px; font-weight: 600; display: flex; justify-content: space-between; }
        .chat-close { cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .chat-close:hover { opacity: 1; }
        .chat-body { padding: 20px; height: 350px; overflow-y: auto; background: var(--light-gray); display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.5; animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .msg-bot { background: var(--white); color: var(--black); align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg-user { background: var(--black); color: var(--white); align-self: flex-end; }
        .chat-input { display: flex; padding: 15px; background: var(--white); border-top: 1px solid #eee; }
        .chat-input input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 50px; outline: none; font-family: 'Inter'; font-size: 14px; background: var(--light-gray); }
        .chat-input button { background: var(--brand-blue); color: var(--white); border: none; width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; cursor: pointer; transition: 0.3s; }
        .chat-input button:hover { transform: scale(1.1); }
    </style>
</head>
