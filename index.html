    <style>
        /* --- VARIABLES --- */
        :root {
            --brand-blue: #599fc4; 
            --black: #000000; 
            --dark-gray: #111111;
            --light-gray: #f5f5f7;
            --white: #ffffff;
            --text-muted: #888888;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--white); color: var(--black); 
            overflow-x: hidden; line-height: 1.6; -webkit-font-smoothing: antialiased; 
        }

        /* --- 100% SAFE CSS ANIMATIONS --- */
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-load {
            animation: floatUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; opacity: 0; }
        .delay-2 { animation-delay: 0.4s; opacity: 0; }

        /* --- HEADER & NAV --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .brand-logo { height: 45px; width: auto; }
        nav { display: flex; gap: 40px; align-items: center; }
        .nav-item { position: relative; padding: 20px 0; }

        .nav-link:hover, .nav-item:hover .nav-link { color: var(--brand-blue); }
        .nav-arrow { font-size: 10px; transition: var(--transition); }
        .nav-item:hover .nav-arrow { transform: rotate(180deg); }
