<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cure & Care | Luxury NDIS Services Melbourne</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- ULTRA LUXURY VARIABLES --- */
        :root {
            --bg-color: #030712; /* Deepest Midnight Blue */
            --surface-color: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-gold: #f59e0b;
            --accent-blue: #38bdf8;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-primary); 
            overflow-x: hidden; line-height: 1.6; -webkit-font-smoothing: antialiased;
        }

        h1, h2, .serif-font { font-family: 'Cormorant Garamond', serif; }

        /* --- SPOTLIGHT EFFECT (BACKGROUND) --- */
        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1;
            background: radial-gradient(circle 600px at var(--x, 50%) var(--y, 50%), rgba(56, 189, 248, 0.1), transparent 80%);
        }

        /* --- FLOATING ORBS --- */
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; z-index: 0; animation: float 20s infinite ease-in-out alternate; }
        .orb-1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #3b82f6; bottom: -200px; right: -100px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 100px); } }

        /* --- CUSTOM CURSOR --- */
        .cursor-dot { position: fixed; width: 8px; height: 8px; background: var(--text-primary); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, background 0.3s; mix-blend-mode: difference; }
        .cursor-outline { position: fixed; width: 40px; height: 40px; border: 1px solid var(--accent-blue); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s; }
        @media (hover: none) and (pointer: coarse) { * { cursor: auto !important; } .cursor-dot, .cursor-outline, .spotlight { display: none; } }

        /* --- ANIMATIONS --- */
        .reveal-wrap { overflow: hidden; display: inline-block; vertical-align: bottom; }
        .reveal-text { transform: translateY(100%); transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-text.visible { transform: translateY(0); }
        
        .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 1s ease, transform 1s ease; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* --- HEADER --- */
        header { 
            position: fixed; width: 100%; top: 0; z-index: 100; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color);
        }
        .logo { font-size: 28px; font-weight: 700; color: var(--text-primary); text-decoration: none; letter-spacing: -1px; }
        .logo span { color: var(--accent-blue); }
        nav { display: flex; gap: 40px; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; transition: var(--transition); }
        .nav-link:hover { color: var(--text-primary); }

        /* --- HERO SECTION --- */
        .hero { position: relative; height: 100vh; display: flex; align-items: center; padding: 0 5%; z-index: 10; }
        .hero-content { max-width: 800px; }
        .hero h1 { font-size: 85px; line-height: 1.1; margin-bottom: 30px; font-weight: 400; }
        .hero h1 i { color: var(--accent-blue); font-style: normal; }
        .hero p { font-size: 20px; color: var(--text-secondary); margin-bottom: 50px; font-weight: 300; max-width: 600px; }
        
        .btn-magnetic { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 160px; height: 160px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-primary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
            transition: background 0.4s, color 0.4s; position: relative; overflow: hidden;
        }
        .btn-magnetic::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--text-primary); border-radius: 50%; transform: scale(0); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: -1; }
        .btn-magnetic:hover { color: var(--bg-color); border-color: transparent; }
        .btn-magnetic:hover::after { transform: scale(1); }

        /* --- SECTIONS & CARDS --- */
        section { padding: 150px 5%; position: relative; z-index: 10; }
        .sec-subtitle { color: var(--accent-blue); text-transform: uppercase; letter-spacing: 4px; font-size: 13px; margin-bottom: 20px; display: block; }
        .sec-title { font-size: 55px; margin-bottom: 60px; font-weight: 400; }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .service-card { 
            background: var(--surface-color); border: 1px solid var(--border-color); padding: 50px 40px; 
            border-radius: 20px; backdrop-filter: blur(10px); transition: var(--transition); position: relative; overflow: hidden;
        }
        .service-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.06), transparent 40%); opacity: 0; transition: opacity 0.3s; z-index: 0; pointer-events: none; }
        .service-card:hover::before { opacity: 1; }
        .service-card:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.1); }
        .card-icon { font-size: 40px; margin-bottom: 20px; display: block; position: relative; z-index: 1; }
        .service-card h3 { font-size: 24px; margin-bottom: 15px; font-weight: 500; position: relative; z-index: 1; }
        .service-card p { color: var(--text-secondary); font-size: 15px; position: relative; z-index: 1; }

        /* --- ABOUT SPLIT --- */
        .about-split { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
        .about-img { width: 100%; height: 600px; object-fit: cover; border-radius: 20px; filter: grayscale(30%); transition: var(--transition); }
